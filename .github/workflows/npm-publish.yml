name: Publish to npm (@ankimcp/anki-mcp-server)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:  # Allows manual triggering from GitHub UI

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for npm OIDC trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing requires npm >= 11.5.1.
      # Node 22 ships with npm 10.9.7 which crashes on direct upgrade to 11.x (npm/cli#9151).
      # Two-step workaround: first upgrade to 11.11.1, then to latest.
      # Remove when Node 22.23.0+ ships with npm >= 10.9.8.
      - name: Upgrade npm to latest
        run: |
          npm install -g npm@11.11.1
          npm install -g npm@latest

      - name: Verify npm version supports OIDC
        run: |
          NPM_VERSION=$(npm --version)
          echo "npm version: $NPM_VERSION"
          # npm >= 11.5.1 is required for trusted publishing
          node -e "
            const v = '$NPM_VERSION'.split('.').map(Number);
            if (v[0] < 11 || (v[0] === 11 && v[1] < 5) || (v[0] === 11 && v[1] === 5 && v[2] < 1)) {
              console.error('ERROR: npm >= 11.5.1 required for trusted publishing, got $NPM_VERSION');
              process.exit(1);
            }
            console.log('npm version OK for trusted publishing');
          "

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # IMPORTANT: Do NOT set NODE_AUTH_TOKEN here.
      # With trusted publishing, npm authenticates via OIDC automatically.
      # Setting NODE_AUTH_TOKEN (even empty) would bypass OIDC and cause 404.
      - name: Publish to npm
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "Package version: $VERSION"

          # Extract prerelease tag (e.g., "beta" from "0.12.0-beta.1")
          if [[ "$VERSION" =~ -([a-zA-Z]+) ]]; then
            NPM_TAG="${BASH_REMATCH[1]}"
            echo "Publishing prerelease to tag: $NPM_TAG"
            npm publish --access public --provenance --tag "$NPM_TAG"
          else
            echo "Publishing stable release to latest"
            npm publish --access public --provenance
          fi
